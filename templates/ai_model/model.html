{% extends "base.html" %}

{% block title %}도(道)와주세요 - {% endblock %}

{% block style %}
<style>
    /* 페이지 공통 섹션 스타일 */
    .bg-section { padding: 80px 0; }

    /* 영상 미리보기 박스 - 컨테이너 역할 (이미지+캔버스 겹침용) */
    .video-box-main {
        width: 100%;
        min-height: 450px;
        background-color: #f8f9fa;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        border: 1px solid #eee;
    }

    /* 이미지와 캔버스가 동일한 위치에 겹치도록 설정 */
    #videoStream {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        display: none;
    }

    #overlayCanvas {
        position: absolute;
        /* 이미지와 똑같이 가운데에 오도록 설정 */
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
    }

    /* 차트 및 리스트 카드 스타일 */
    .info-card {
        background-color: #ffffff;
        border-radius: 15px;
        padding: 25px;
        border: none;
    }

    /* 업로드 진행바 커스텀 */
    .progress-custom {
        height: 12px;
        border-radius: 10px;
        margin-top: 15px;
    }

    .btn-teal {
        background-color: #20828A;
        color: white;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-teal:hover {
        background-color: #165e63;
        color: white;
    }

    h1, h2, h3, p, span {
        font-family: 'Pretendard', sans-serif !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="container bg-section">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold mb-3">도(道)와주세요</h1>
        <p class="lead text-muted">AI가 분석하는 실시간 도로 안전 리포트</p>
        <hr class="mx-auto" style="width: 60px; height: 4px; background-color: #20828a; opacity: 1;">
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="video-box-main shadow-sm" id="streamContainer">
                <img id="videoStream" src="">
                <canvas id="overlayCanvas"></canvas>

                <div id="placeholderUI" class="text-center">
                    <i class="bi bi-camera-video text-muted" style="font-size: 3rem;"></i>
                    <p class="mt-3 text-muted">미리보기 영역</p>
                    <small class="text-secondary">파일을 첨부한 뒤 분석 시작 버튼을 눌러주세요.</small>
                </div>
            </div>

            <div class="progress progress-custom shadow-sm">
                <div id="analysisProgress" class="progress-bar progress-bar-striped progress-bar-animated"
                     role="progressbar" style="width: 0%; background-color: #20828A;"></div>
            </div>
            <p id="statusText" class="text-center mt-2 small text-muted"><br>현재 분석 대기 중</p>
        </div>

        <div class="col-lg-4">
            <div class="info-card shadow-sm mb-4">
                <form id="uploadForm">
                    <input type="file" id="videoFile" class="d-none" accept="video/*, image/*">
                    <button type="button" class="btn btn-teal w-100 py-3 mb-3" onclick="document.getElementById('videoFile').click()">
                        <i class="bi bi-folder2-open me-2"></i> 파일 첨부
                    </button>
                    <button type="submit" id="startBtn" class="btn btn-outline-secondary w-100 py-2" disabled>
                        분석 시작
                    </button>
                </form>

                <div class="mt-4">
                    <h3 class="h6 fw-bold border-bottom pb-2 mb-3">탐지된 객체 리스트</h3>
                    <div id="detectionList" class="overflow-auto" style="max-height: 120px;">
                        <p class="text-muted small mb-0">분석을 시작하면 목록이 표시됩니다.</p>
                    </div>
                </div>
            </div>

            <div class="info-card shadow-sm">
                <h3 class="h6 fw-bold mb-3">객체 탐지 통계</h3>
                <canvas id="statChart" height="250"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // 1. 차트 초기화
    const ctx = document.getElementById('statChart').getContext('2d');
    const statChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['멧돼지', '고라니', '너구리'],
            datasets: [{
                label: '탐지 수',
                data: [0, 0, 0],
                backgroundColor: '#20828A',
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true, ticks: { stepSize: 1 } }
            }
        }
    });

    const fileInput = document.getElementById('videoFile');
    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('statusText');
    const progressBar = document.getElementById('analysisProgress');
    const videoStream = document.getElementById('videoStream');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const placeholderUI = document.getElementById('placeholderUI');
    const drawCtx = overlayCanvas.getContext('2d');

    // 2. 파일 선택 시 미리보기 처리
    fileInput.onchange = function() {
        if(this.files.length > 0) {
            startBtn.classList.replace('btn-outline-secondary', 'btn-teal');
            startBtn.disabled = false;
            statusText.innerText = "분석 준비 완료: " + this.files[0].name;

            videoStream.src = URL.createObjectURL(this.files[0]);
            videoStream.style.display = 'block';
            placeholderUI.style.display = 'none';

            // 새 파일 선택 시 이전 캔버스 기록 삭제
            drawCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        }
    };

    // 3. 서버 분석 연결 및 바운딩 박스 그리기
    document.getElementById('uploadForm').onsubmit = async function(e) {
        e.preventDefault();
        const file = fileInput.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        statusText.innerText = "AI 모델 분석 중...";
        progressBar.style.width = "40%";
        startBtn.disabled = true;

        try {
            const response = await fetch('/model/detect', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.success) {
                progressBar.style.width = "100%";
                statusText.innerText = "분석 완료!";

                // 차트 업데이트
                statChart.data.datasets[0].data = result.counts;
                statChart.update();

                // 리스트 업데이트
                const listHTML = result.detections.map(d => `
                    <div class="d-flex justify-content-between border-bottom py-1 small">
                        <span class="text-danger fw-bold">${d.label}</span>
                        <span class="text-muted">${d.conf}</span>
                    </div>
                `).join('');
                document.getElementById('detectionList').innerHTML = listHTML || '<p class="text-muted small">탐지된 객체 없음</p>';

                // [추가 기능] 바운딩 박스 그리기 실행
                if (result.detections.length > 0) {
                    drawBoundingBoxes(result.detections);
                }
            } else {
                alert("분석 실패: " + result.error);
                statusText.innerText = "분석 오류 발생";
            }
        } catch (error) {
            console.error("Error:", error);
            statusText.innerText = "서버 연결 오류";
        } finally {
            startBtn.disabled = false;
        }
    };

    // [핵심] 바운딩 박스 그리기 함수
    function drawBoundingBoxes(detections) {
    const img = videoStream;

    // [중요] 이미지가 화면에서 실제로 차지하는 '진짜' 크기를 구합니다.
    const imgWidth = img.clientWidth;
    const imgHeight = img.clientHeight;
    const nativeWidth = img.naturalWidth;
    const nativeHeight = img.naturalHeight;

    const imgRatio = nativeWidth / nativeHeight;
    const containerRatio = imgWidth / imgHeight;

    let displayWidth, displayHeight;

    // object-fit: contain 로직을 자바스크립트로 계산
    if (imgRatio > containerRatio) {
        displayWidth = imgWidth;
        displayHeight = imgWidth / imgRatio;
    } else {
        displayHeight = imgHeight;
        displayWidth = imgHeight * imgRatio;
    }

    // 캔버스 크기를 '박스가 쳐진 실제 이미지 영역'에 딱 맞춥니다.
    overlayCanvas.width = displayWidth;
    overlayCanvas.height = displayHeight;

    drawCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

    detections.forEach(det => {
        if (!det.bbox) return;

        // 상대 좌표(0~1)를 실제 그려진 이미지 크기에 곱함
        const [x1, y1, x2, y2] = det.bbox;
        const startX = x1 * displayWidth;
        const startY = y1 * displayHeight;
        const width = (x2 - x1) * displayWidth;
        const height = (y2 - y1) * displayHeight;

        // 박스 그리기
        drawCtx.strokeStyle = "#FF3B30";
        drawCtx.lineWidth = 3;
        drawCtx.strokeRect(startX, startY, width, height);

        // 라벨 그리기
        const label = `${det.label} ${det.conf}`;
        drawCtx.font = "bold 14px Pretendard";
        const textWidth = drawCtx.measureText(label).width;

        drawCtx.fillStyle = "#FF3B30";
        drawCtx.fillRect(startX, startY - 20 < 0 ? startY : startY - 20, textWidth + 10, 20);

        drawCtx.fillStyle = "white";
        drawCtx.fillText(label, startX + 5, startY - 20 < 0 ? startY + 15 : startY - 5);
    });
}

    // 창 크기가 조절될 때 박스 위치도 재조정
    window.addEventListener('resize', () => {
        if (videoStream.style.display === 'block') {
            // 현재 리스트에 있는 데이터를 기준으로 다시 그림 (재분석 방지)
            // 실제 구현 시에는 result 데이터를 변수에 저장해두고 재사용하는 것이 좋습니다.
        }
    });
</script>
{% endblock %}
