{% extends "base.html" %}

{% block title %}도(道)와주세요 - {% endblock %}

{% block style %}
<style>
    /* 페이지 공통 섹션 스타일 */
    .bg-section { padding: 80px 0; }
    
    /* 기존 포인트 텍스트 스타일 유지 */
    .point-text {
        background-color: #20828a;
        color: #ffffff;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 5px;
        display: inline-block;
        line-height: 1.2;
    }

    /* 영상 미리보기 박스 (프로젝트 배경 페이지의 img-box-fixed 스타일 활용) */
    .video-box-main {
        width: 100%;
        min-height: 450px;
        background-color: #f8f9fa;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        border: 1px solid #eee;
    }

    /* 차트 및 리스트 카드 스타일 */
    .info-card {
        background-color: #ffffff;
        border-radius: 15px;
        padding: 25px;
        border: none;
    }

    /* 업로드 진행바 커스텀 */
    .progress-custom {
        height: 12px;
        border-radius: 10px;
        margin-top: 15px;
    }

    .btn-teal {
        background-color: #20828A;
        color: white;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-teal:hover {
        background-color: #165e63;
        color: white;
    }

    /* 폰트 일관성 유지 */
    h1, h2, h3, p, span {
        font-family: 'Pretendard', sans-serif !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="container bg-section">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold mb-3">도(道)와주세요</h1>
        <p class="lead text-muted">AI가 분석하는 실시간 도로 안전 리포트</p>
        <hr class="mx-auto" style="width: 60px; height: 4px; background-color: #20828a; opacity: 1;">
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="video-box-main shadow-sm">
                <img id="videoStream" src="" style="width: 100%; height: 100%; object-fit: contain; display: none;">
                
                <div id="placeholderUI" class="text-center">
                    <i class="bi bi-camera-video text-muted" style="font-size: 3rem;"></i>
                    <p class="mt-3 text-muted">영상 미리보기 영역</p>
                    <small class="text-secondary">파일을 첨부한 뒤 분석 시작 버튼을 눌러주세요.</small>
                </div>
            </div>
            
            <div class="progress progress-custom shadow-sm">
                <div id="analysisProgress" class="progress-bar progress-bar-striped progress-bar-animated" 
                     role="progressbar" style="width: 0%; background-color: #20828A;"></div>
            </div>
            <p id="statusText" class="text-center mt-2 small text-muted">현재 분석 대기 중</p>
        </div>

        <div class="col-lg-4">
            <div class="info-card shadow-sm mb-4">
                <form id="uploadForm">
                    <input type="file" id="videoFile" class="d-none" accept="video/*">
                    <button type="button" class="btn btn-teal w-100 py-3 mb-3" onclick="document.getElementById('videoFile').click()">
                        <i class="bi bi-folder2-open me-2"></i> 파일 첨부
                    </button>
                    <button type="submit" id="startBtn" class="btn btn-outline-secondary w-100 py-2" disabled>
                        분석 결과 다운로드
                    </button>
                </form>
                
                <div class="mt-4">
                    <h3 class="h6 fw-bold border-bottom pb-2 mb-3">탐지된 객체 리스트</h3>
                    <div id="detectionList" class="overflow-auto" style="max-height: 120px;">
                        <p class="text-muted small mb-0">분석을 시작하면 목록이 표시됩니다.</p>
                    </div>
                </div>
            </div>

            <div class="info-card shadow-sm">
                <h3 class="h6 fw-bold mb-3">객체 탐지 통계</h3>
                <canvas id="statChart" height="250"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // 1. 차트 초기화
    const ctx = document.getElementById('statChart').getContext('2d');
    const statChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['사람', '차량', '자전거', '고라니', '왜가리'],
            datasets: [{
                label: '탐지 수',
                data: [0, 0, 0, 0, 0], // 초기값
                backgroundColor: '#20828A',
                borderRadius: 5
            }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });

    // 2. 파일 업로드 로직
    const fileInput = document.getElementById('videoFile');
    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('statusText');
    const progressBar = document.getElementById('analysisProgress');

    fileInput.onchange = function() {
        if(this.files.length > 0) {
            startBtn.classList.replace('btn-outline-secondary', 'btn-teal');
            startBtn.disabled = false;
            statusText.innerText = "분석 준비 완료: " + this.files[0].name;
            startBtn.innerText = "분석 시작";
        }
    };

    // 3. 분석 시작 시뮬레이션 (여기서 .pt 모델을 돌리는 Flask API와 연결하면 됩니다)
    document.getElementById('uploadForm').onsubmit = function(e) {
        e.preventDefault();
        statusText.innerText = "YOLOv11 모델 분석 중...";
        progressBar.style.width = "65%";
        
        setTimeout(() => {
            progressBar.style.width = "100%";
            statusText.innerText = "분석 완료!";
            document.getElementById('placeholderUI').style.display = 'none';
            document.getElementById('videoStream').style.display = 'block';
            
            // 시뮬레이션용 데이터 업데이트
            statChart.data.datasets[0].data = [15, 42, 10, 185, 5];
            statChart.update();
            
            document.getElementById('detectionList').innerHTML = `
                <div class="d-flex justify-content-between border-bottom py-1 small">
                    <span class="text-danger fw-bold">고라니</span>
                    <span class="text-muted">98% 신뢰도</span>
                </div>
                <div class="d-flex justify-content-between border-bottom py-1 small">
                    <span>차량</span>
                    <span class="text-muted">92% 신뢰도</span>
                </div>
            `;
        }, 1500);
    };
</script>
{% endblock %}
