{% extends "base.html" %}

{% block title %}도(道)와주세요 - {% endblock %}

{% block style %}
<style>
    .bg-section { padding: 80px 0; }
    .video-box-main {
        width: 100%;
        min-height: 450px;
        background-color: #f8f9fa;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        border: 1px solid #eee;
    }
    #videoStream, #videoPlayer {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        display: none;
    }
    #overlayCanvas {
        position: absolute;
        pointer-events: none;
        z-index: 10;
    }
    .play-overlay {
        position: absolute;
        z-index: 20;
        font-size: 4rem;
        color: rgba(32, 130, 138, 0.8);
        cursor: pointer;
        display: none;
        transition: transform 0.2s;
    }
    .play-overlay:hover { transform: scale(1.1); color: #20828A; }

    .info-card { background-color: #ffffff; border-radius: 15px; padding: 25px; border: none; }
    .progress-custom { height: 12px; border-radius: 10px; margin-top: 15px; }
    .btn-teal { background-color: #20828A; color: white; font-weight: 600; transition: 0.3s; }
    .btn-teal:hover { background-color: #165e63; color: white; }
    h1, h2, h3, p, span { font-family: 'Pretendard', sans-serif !important; }
</style>
{% endblock %}

{% block content %}
<div class="container bg-section">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold mb-3">도(道)와주세요</h1>
        <p class="lead text-muted">AI가 분석하는 실시간 도로 안전 리포트</p>
        <hr class="mx-auto" style="width: 60px; height: 4px; background-color: #20828a; opacity: 1;">
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="video-box-main shadow-sm" id="streamContainer">
                <img id="videoStream" src="">
                <video id="videoPlayer" muted playsinline></video>

                <div id="playBtn" class="play-overlay">
                    <i id="playIcon" class="bi bi-play-circle-fill"></i>
                </div>

                <canvas id="overlayCanvas"></canvas>
                <div id="placeholderUI" class="text-center">
                    <i class="bi bi-camera-video text-muted" style="font-size: 3rem;"></i>
                    <p class="mt-3 text-muted">미리보기 영역</p>
                </div>
            </div>
            <div class="progress progress-custom shadow-sm">
                <div id="analysisProgress" class="progress-bar progress-bar-striped progress-bar-animated"
                     role="progressbar" style="width: 0%; background-color: #20828A;"></div>
            </div>
            <p id="statusText" class="text-center mt-2 small text-muted"><br>현재 분석 대기 중</p>
        </div>

        <div class="col-lg-4">
            <div class="info-card shadow-sm mb-4">
                <form id="uploadForm">
                    <input type="file" id="videoFile" class="d-none" accept="video/*, image/*" onclick="this.value=null;">
                    <button type="button" class="btn btn-teal w-100 py-3 mb-3" onclick="document.getElementById('videoFile').click()">
                        <i class="bi bi-folder2-open me-2"></i> 파일 첨부
                    </button>
                    <button type="submit" id="startBtn" class="btn btn-outline-secondary w-100 py-2" disabled>
                        분석 및 재생 시작
                    </button>
                </form>
                <div class="mt-4">
                    <h3 class="h6 fw-bold border-bottom pb-2 mb-3">탐지된 객체 리스트</h3>
                    <div id="detectionList" class="overflow-auto" style="max-height: 120px;">
                        <p class="text-muted small mb-0">분석을 시작하면 목록이 표시됩니다.</p>
                    </div>
                </div>
            </div>
            <div class="info-card shadow-sm">
                <h3 class="h6 fw-bold mb-3">객체 탐지 통계</h3>
                <canvas id="statChart" height="250"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let totalCounts = [0, 0, 0];
    const labels = ['멧돼지', '고라니', '너구리'];
    let statChart = null;

    function initChart() {
        const ctx = document.getElementById('statChart').getContext('2d');
        if (statChart !== null) {
            statChart.destroy();
        }
        statChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{ label: '누적 탐지 수', data: totalCounts, backgroundColor: '#20828A', borderRadius: 5 }]
            },
            options: {
                responsive: true,
                animation: { duration: 500 },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });
    }

    initChart();

    const fileInput = document.getElementById('videoFile');
    const startBtn = document.getElementById('startBtn');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon'); // [추가] 아이콘 객체
    const statusText = document.getElementById('statusText');
    const progressBar = document.getElementById('analysisProgress');
    const videoStream = document.getElementById('videoStream');
    const videoPlayer = document.getElementById('videoPlayer');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const drawCtx = overlayCanvas.getContext('2d');

    let analysisLoop = null;
    let lastResult = null;
    let isAnalysisActive = false;
    let currentFile = null; // [추가] 현재 선택된 파일을 저장할 금고

    fileInput.onchange = function() {
        if(this.files && this.files.length > 0) {
            currentFile = this.files[0]; // [핵심] 금고에 파일 저장

            stopAnalysis();
            resetData();
            const fileURL = URL.createObjectURL(currentFile);
            const isVideo = currentFile.type.startsWith('video/');

            startBtn.classList.replace('btn-outline-secondary', 'btn-teal');
            startBtn.disabled = false;

            statusText.innerText = "준비 완료: " + currentFile.name;
            progressBar.style.width = "0%";
            progressBar.classList.add('progress-bar-animated');
            document.getElementById('placeholderUI').style.display = 'none';

            if (isVideo) {
                videoStream.style.display = 'none';
                videoPlayer.style.display = 'block';
                videoPlayer.src = fileURL;
                videoPlayer.load(); // [핵심] 영상 다시 로드
                playBtn.style.display = 'block';
                playIcon.className = 'bi bi-play-circle-fill';
            } else {
                videoPlayer.style.display = 'none';
                videoStream.style.display = 'block';
                videoStream.src = fileURL;
                playBtn.style.display = 'none';
            }
            drawCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        }
    };

    function resetData() {
        totalCounts = [0, 0, 0];
        initChart();
        document.getElementById('detectionList').innerHTML = '<p class="text-muted small mb-0">분석을 시작하면 목록이 표시됩니다.</p>';
    }

    // [종결] 재생/일시정지 및 아이콘 제어 통합 로직
    function toggleVideo() {
        if (videoPlayer.paused) {
            videoPlayer.play();
            // 일시정지 아이콘으로 교체 후 0.5초 뒤 숨김
            playIcon.className = 'bi bi-pause-circle-fill';
            playBtn.style.display = 'block';
            setTimeout(() => {
                if (!videoPlayer.paused) playBtn.style.display = 'none';
            }, 500);

            if (isAnalysisActive) startAnalysis();
        } else {
            videoPlayer.pause();
            // 재생 아이콘으로 교체 후 계속 표시
            playIcon.className = 'bi bi-play-circle-fill';
            playBtn.style.display = 'block';

            // 분석 루프만 정지 (상태는 유지)
            if (analysisLoop) {
                clearInterval(analysisLoop);
                analysisLoop = null;
            }
        }
    }

    playBtn.onclick = toggleVideo;
    videoPlayer.onclick = toggleVideo;

    function stopAnalysis() {
        if (analysisLoop) clearInterval(analysisLoop);
        analysisLoop = null;
        isAnalysisActive = false;
    }

    function startAnalysis() {
        if (analysisLoop) return;
        isAnalysisActive = true;
        analysisLoop = setInterval(() => {
            if (!videoPlayer.paused && !videoPlayer.ended && isAnalysisActive) {
                analyzeFrame(videoPlayer);
            }
        }, 500);
    }

    document.getElementById('uploadForm').onsubmit = async function(e) {
        e.preventDefault();

        // [수정] fileInput 대신 currentFile을 사용!
        const file = currentFile;
        if (!file) return;

        resetData();
        isAnalysisActive = true;

        progressBar.style.transition = 'none';
        progressBar.style.width = "0%";

        if (file.type.startsWith('video/')) {
            videoPlayer.pause();
            videoPlayer.currentTime = 0;
        }

        setTimeout(async () => {
            progressBar.style.transition = 'width 2.0s ease-out';
            progressBar.style.width = "85%";
            progressBar.classList.add('progress-bar-animated');

            statusText.innerText = "분석 진행 중...";

            if (file.type.startsWith('video/')) {
                playBtn.style.display = 'none'; // 분석 시작 시 아이콘 일단 숨김
                videoPlayer.play();
                startAnalysis();
            } else {
                await analyzeFrame(videoStream);
                progressBar.style.transition = 'width 0.3s ease-in-out';
                progressBar.style.width = "100%";
                statusText.innerText = "분석 완료!";
                progressBar.classList.remove('progress-bar-animated');
            }
        }, 10);
    };

    // [수정] 비디오 끝날 때 로직: '분석 모드'일 때만 결과 표시
    videoPlayer.onended = () => {
        // 분석 중이었을 때만 실행
        if (isAnalysisActive) {
            stopAnalysis(); // 분석 루프 및 플래그 종료

            // 게이지 꽉 채우기 및 문구 변경
            progressBar.style.transition = 'width 0.3s ease-in-out';
            progressBar.style.width = "100%";
            statusText.innerText = "분석 완료!";
            progressBar.classList.remove('progress-bar-animated');
        } else {
            // 그냥 미리보기 재생만 끝난 경우
            playBtn.style.display = 'block';
            playIcon.className = 'bi bi-play-circle-fill';
            // statusText는 건드리지 않거나 "준비 완료" 상태 유지
        }
    };

    function analyzeFrame(mediaElement) {
        return new Promise((resolve) => {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = (mediaElement.tagName === 'VIDEO') ? mediaElement.videoWidth : mediaElement.naturalWidth;
            tempCanvas.height = (mediaElement.tagName === 'VIDEO') ? mediaElement.videoHeight : mediaElement.naturalHeight;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(mediaElement, 0, 0, tempCanvas.width, tempCanvas.height);

            tempCanvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'frame.jpg');
                try {
                    const response = await fetch('/model/detect', { method: 'POST', body: formData });
                    const result = await response.json();
                    if (result.success) {
                        lastResult = result.detections;
                        accumulateData(result);
                        drawBoundingBoxes(result.detections);
                    }
                } catch (err) {
                    console.error(err);
                } finally {
                    resolve();
                }
            }, 'image/jpeg', 0.7);
        });
    }

    function accumulateData(result) {
        result.counts.forEach((count, idx) => {
            totalCounts[idx] += count;
        });
        // 실시간 반영을 위해 'none' 제거 및 데이터 갱신 명시
        if (statChart) {
            statChart.data.datasets[0].data = totalCounts;
            statChart.update();
        }

        const validDetections = result.detections.filter(d => parseFloat(d.conf) > 0.4);
        if (validDetections.length > 0) {
            const listContainer = document.getElementById('detectionList');
            if (listContainer.querySelector('p.text-muted')) listContainer.innerHTML = '';

            validDetections.forEach(d => {
                const item = document.createElement('div');
                item.className = "d-flex justify-content-between border-bottom py-1 small";
                item.innerHTML = `
                    <span class="text-primary fw-bold">${d.label}</span>
                    <span class="text-muted">${d.conf} (탐지됨)</span>
                `;
                listContainer.insertBefore(item, listContainer.firstChild);
            });
        }
    }

    function drawBoundingBoxes(detections) {
        const media = videoStream.style.display === 'block' ? videoStream : videoPlayer;
        if (!media.clientWidth) return; // 미디어가 아직 로드되지 않은 경우 방지

        const mediaWidth = media.clientWidth;
        const mediaHeight = media.clientHeight;
        const nativeWidth = media.tagName === 'VIDEO' ? media.videoWidth : media.naturalWidth;
        const nativeHeight = media.tagName === 'VIDEO' ? media.videoHeight : media.naturalHeight;

        const mediaRatio = nativeWidth / nativeHeight;
        const containerRatio = mediaWidth / mediaHeight;

        let displayWidth, displayHeight;
        if (mediaRatio > containerRatio) {
            displayWidth = mediaWidth;
            displayHeight = mediaWidth / mediaRatio;
        } else {
            displayHeight = mediaHeight;
            displayWidth = mediaHeight * mediaRatio;
        }

        overlayCanvas.width = displayWidth;
        overlayCanvas.height = displayHeight;
        overlayCanvas.style.left = media.offsetLeft + (mediaWidth - displayWidth) / 2 + 'px';
        overlayCanvas.style.top = media.offsetTop + (mediaHeight - displayHeight) / 2 + 'px';

        drawCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

        detections.forEach(det => {
            if (!det.bbox || parseFloat(det.conf) < 0.4) return;
            const [x1, y1, x2, y2] = det.bbox;
            const startX = x1 * displayWidth;
            const startY = y1 * displayHeight;
            const width = (x2 - x1) * displayWidth;
            const height = (y2 - y1) * displayHeight;

            drawCtx.strokeStyle = "#007BFF";
            drawCtx.lineWidth = 3;
            drawCtx.strokeRect(startX, startY, width, height);

            drawCtx.fillStyle = "#007BFF";
            drawCtx.font = "bold 14px Pretendard";
            const label = `${det.label} ${det.conf}`;
            const textWidth = drawCtx.measureText(label).width;

            const labelBgWidth = textWidth + 10;
            const labelBgHeight = 20;
            const labelY = startY - labelBgHeight < 0 ? startY : startY - labelBgHeight;
            drawCtx.fillRect(startX, labelY, labelBgWidth, labelBgHeight);

            drawCtx.fillStyle = "white";
            drawCtx.fillText(label, startX + 5, labelY + 15);
        });
    }

    window.addEventListener('resize', () => { if (lastResult) drawBoundingBoxes(lastResult); });
</script>
{% endblock %}
