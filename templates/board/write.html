{% extends 'base.html' %}

{% block content %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/summernote/0.8.18/lang/summernote-ko-KR.min.js"></script>

<style>
    :root {
        --primary-teal: #20828A;
        --light-gray: #f8f9fa;
    }

    /* 도서관 스타일 커스텀 */
    .note-editor.note-frame {
        border: 1px solid #dee2e6;
        border-radius: 12px;
        overflow: hidden;
    }
    .note-toolbar { background-color: var(--light-gray) !important; border-bottom: 1px solid #dee2e6 !important; }

    /* 등록 버튼 비활성화 스타일 */
    .btn-primary:disabled {
        background-color: #a0c4c7 !important;
        border-color: #a0c4c7 !important;
        cursor: not-allowed;
    }
</style>

<div class="container mt-5 mb-5" style="max-width: 900px;">
    {% if not session.get('user_id') %}
    <script>
        alert("로그인이 필요한 서비스입니다.");
        window.location.href = "/login";
    </script>
    {% else %}

    <div class="card shadow border-0 rounded-4">
        <div class="card-header bg-white border-bottom-0 pt-4 px-4">
            <h4 class="fw-bold">
                <i class="bi bi-pencil-square me-2" style="color: var(--primary-teal);"></i>게시글 작성
            </h4>
        </div>

        <div class="card-body p-4">
            <form action="/board/write" method="POST" id="writeForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted">제목</label>
                    <input type="text" id="postTitle" name="title" class="form-control form-control-lg border-0 bg-light"
                           placeholder="제목을 입력하세요" required maxlength="100">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted">내용</label>
                    <textarea id="summernote" name="content" required></textarea>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end gap-2">
                    <a href="/board" class="btn btn-light px-4 rounded-pill fw-bold text-secondary">취소</a>
                    <button type="submit" id="submitBtn" class="btn btn-primary px-5 rounded-pill fw-bold border-0"
                            style="background-color: var(--primary-teal);" disabled>
                        <i class="bi bi-check-lg me-1"></i> 등록하기
                    </button>
                </div>
            </form>
        </div>
    </div>
    {% endif %}
</div>

<script>
    $(document).ready(function() {
        const $summernote = $('#summernote');
        const $titleInput = $('#postTitle');
        const $submitBtn = $('#submitBtn');

        // 1. Summernote 초기화
        $summernote.summernote({
            placeholder: '도로 위 위험 상황이나 공유하고 싶은 내용을 적어주세요.',
            height: 450,
            lang: 'ko-KR',
            toolbar: [
                ['font', ['bold', 'underline', 'clear']],
                ['color', ['color']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['insert', ['link', 'picture', 'video']],
                ['view', ['codeview']]
            ],
            callbacks: {
                // [기능] 내용이 바뀔 때마다 버튼 활성화 체크
                onChange: function(contents, $editable) {
                    checkFormValidity();
                },
                onImageUpload: function(files) {
                    for (let i = 0; i < files.length; i++) {
                        uploadImage(files[i]);
                    }
                }
            }
        });

        // [기능] 제목 입력 시마다 버튼 활성화 체크
        $titleInput.on('input', function() {
            checkFormValidity();
        });

        // [로직] 제목과 본문이 비어있지 않은지 검사
        function checkFormValidity() {
            const titleValue = $titleInput.val().trim();
            const contentValue = $summernote.summernote('isEmpty') ? "" : $summernote.val().trim();

            if (titleValue.length > 0 && contentValue.length > 0) {
                $submitBtn.prop('disabled', false);
            } else {
                $submitBtn.prop('disabled', true);
            }
        }
    });

    // 이미지 업로드 (기존 fetch 로직 유지)
    function uploadImage(file) {
        const formData = new FormData();
        formData.append("file", file);
        fetch('/board/upload/image', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => $('#summernote').summernote('insertImage', data.url))
        .catch(err => alert("이미지 업로드 실패"));
    }
</script>
{% endblock %}
