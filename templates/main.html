{% extends "base.html" %}

{% block content %}
    <header class="hero-section">
        <div class="hero-bg-image"></div>
        <div class="container hero-content">
            <h1 class="hero-title">도로 위의 숨은 위험,<br>
              <span style="background-color: #f4ebd0; padding: 0 10px; border-radius: 5px;">도(道)서관</span>이 먼저 읽습니다.</h1>
            <p class="hero-subtitle">Unveiling the Hidden Risks on the Road, First.</p>
             <a href="/model" class="text-decoration-none">
                <button class="btn btn-teal">S T A R T</button>
            </a>
        </div>
    </header>

    <section class="container py-5" style="position: relative; z-index: 20; margin-top: 40px; padding-bottom: 80px !important;">
    <div class="row g-4">
        <div class="col-md-4">
            <a href="/board/list" class="text-decoration-none" style="color: inherit;">
                <div class="feature-card text-center h-100">
                    <div class="icon-box mx-auto">
                        <svg width="1em" height="1em" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M5 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0m4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0m4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0"/>

                        </svg>
                    </div>
                    <h3 class="card-title mb-4">도(道)란도란</h3>
                    <p class="card-text text-muted">도로 위의 위험 상황을 공유하고, 커뮤니티를 통해<br>베테랑 운전자들과 소통하세요.</p>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/tip" class="text-decoration-none" style="color: inherit;">
                <div class="feature-card text-center h-100">
                    <div class="icon-box mx-auto">
                        <svg width="1em" height="1em" viewBox="0 0 16 16" fill="currentColor">
                            <path fill-rule="evenodd" d="M5 11.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5M3.854 2.146a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0l-.5-.5a.5.5 0 1 1 .708-.708L2 3.293l1.146-1.147a.5.5 0 0 1 .708 0m0 4a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0l-.5-.5a.5.5 0 1 1 .708-.708L2 7.293l1.146-1.147a.5.5 0 0 1 .708 0m0 4a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0l-.5-.5a.5.5 0 0 1 .708-.708l.146.147 1.146-1.147a.5.5 0 0 1 .708 0"/>
                        </svg>
                    </div>
                    <h3 class="card-title mb-4">도(道)움말</h3>
                    <p class="card-text text-muted">반드시 지켜야 할 주행 수칙과 사고 예방을 위한<br>주의 사항을 확인하세요.</p>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/introduce/features" class="text-decoration-none" style="color: inherit;">
                <div class="feature-card text-center h-100">
                    <div class="icon-box mx-auto">
                        <svg width="1em" height="1em" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.652-.689-1.782-.886-3.112-.752-1.234.124-2.503.523-3.388.893V2.828zm7.5.752c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.885-.37-2.154-.769-3.388-.893-1.33-.134-2.458.063-3.112.752V3.58z"/>
                        </svg>
                    </div>
                    <h3 class="card-title mb-4">소개</h3>
                    <p class="card-text text-muted">프로젝트 개요, 로고, 홈페이지 소개 및 사용 방법을<br>확인하세요.</p>
                </div>
            </a>
        </div>
    </div>
</section>
