{% extends "base.html" %}

{% block title %}404 - 페이지를 찾을 수 없습니다 | {% endblock %}

{% block style %}
<style>
    :root {
        --communa-primary: #20828A;
        --communa-hover: #186b72;
        --communa-light: #e8f5f6;
        --communa-faint: #f3fafb;
    }

    body {
        background-color: var(--communa-faint);
        font-family: 'Pretendard', sans-serif;
        min-height: 100vh;
    }

    /* ── 404 섹션 ── */
    .error-section {
        min-height: calc(100vh - 160px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 1rem;
    }

    /* ── 카드 ── */
    .error-card {
        background: #fff;
        border-radius: 1.5rem;
        box-shadow: 0 8px 40px rgba(32, 130, 138, 0.10);
        padding: 3.5rem 3rem;
        max-width: 560px;
        width: 100%;
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    /* 카드 상단 컬러 바 */
    .error-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 5px;
        background: linear-gradient(90deg, var(--communa-primary), #5bc4cc);
    }

    /* ── 404 숫자 ── */
    .error-code {
        font-size: 7rem;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -4px;
        background: linear-gradient(135deg, var(--communa-primary) 0%, #5bc4cc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.25rem;
        animation: fadeSlideDown 0.6s ease both;
    }

    /* ── 아이콘 ── */
    .error-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        display: block;
        animation: fadeSlideDown 0.6s 0.1s ease both;
    }

    /* ── 타이틀 / 설명 ── */
    .error-title {
        font-size: 1.4rem;
        font-weight: 700;
        color: #1a3a3d;
        margin-bottom: 0.6rem;
        animation: fadeSlideDown 0.6s 0.2s ease both;
    }

    .error-desc {
        color: #6c8e91;
        font-size: 0.95rem;
        line-height: 1.7;
        margin-bottom: 2rem;
        animation: fadeSlideDown 0.6s 0.3s ease both;
    }

    /* ── 버튼 ── */
    .btn-home {
        background-color: var(--communa-primary);
        border: none;
        color: #fff;
        padding: 0.7rem 2rem;
        border-radius: 0.75rem;
        font-weight: 600;
        font-size: 0.95rem;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        transition: background-color 0.2s, transform 0.15s, box-shadow 0.2s;
        animation: fadeSlideDown 0.6s 0.4s ease both;
    }

    .btn-home:hover {
        background-color: var(--communa-hover);
        color: #fff;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(32, 130, 138, 0.30);
    }

    .btn-home:active {
        transform: translateY(0);
    }

    .btn-back {
        color: var(--communa-primary);
        font-size: 0.88rem;
        font-weight: 500;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        margin-top: 1rem;
        transition: color 0.2s;
        animation: fadeSlideDown 0.6s 0.5s ease both;
    }

    .btn-back:hover {
        color: var(--communa-hover);
    }

    /* ── 구분선 ── */
    .error-divider {
        border: none;
        border-top: 1.5px solid var(--communa-light);
        margin: 2rem 0 1.5rem;
    }

    /* ── 도움말 링크 ── */
    .help-links {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        flex-wrap: wrap;
        animation: fadeSlideDown 0.6s 0.55s ease both;
    }

    .help-link {
        color: #6c8e91;
        font-size: 0.85rem;
        text-decoration: none;
        transition: color 0.2s;
    }

    .help-link:hover {
        color: var(--communa-primary);
    }

    /* ── 애니메이션 ── */
    @keyframes fadeSlideDown {
        from {
            opacity: 0;
            transform: translateY(-14px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
        .error-card {
            padding: 2.5rem 1.5rem;
        }
        .error-code {
            font-size: 5rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="error-section">
    <div class="error-card">

        <span class="error-icon">🔍</span>
        <div class="error-code">404</div>
        <h1 class="error-title">페이지를 찾을 수 없어요</h1>
        <p class="error-desc">
            요청하신 페이지가 삭제되었거나,<br>
            주소가 변경되었거나, 존재하지 않는 페이지입니다.
        </p>

        <a href="{{ url_for('index') }}" class="btn-home">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4.5v-4h3v4H14a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L8.354 1.146z"/>
            </svg>
            홈으로 돌아가기
        </a>

        <br>

        <a href="javascript:history.back()" class="btn-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
            </svg>
            이전 페이지로
        </a>
    </div>
</section>
{% endblock %}
