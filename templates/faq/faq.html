{% extends "base.html" %}

{% block title %}도움말 - {% endblock %}

{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/faq/faq.css') }}">
{% endblock %}

{% block content %}
<div class="container bg-section">
    <div class="help-hero text-center shadow-sm">
        <br><h1 class="display-5 fw-bold mb-3">어떻게 도와드릴까요?</h1>
        <p class="lead mb-4" style="opacity: 0.9;">도로 위의 숨은 위험, 도(道)서관이 먼저 읽습니다.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-9">
            <h2 class="h4 fw-bold mb-4 px-2">자주 사용되는 도움말</h2>

            <div class="accordion accordion-flush" id="faqAccordion">
                {% for faq in faqs %}
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button {% if not loop.first %}collapsed{% endif %}"
                                type="button"
                                data-bs-toggle="collapse"
                                data-bs-target="#faq{{ faq.id }}">
                            Q. {{ faq.question }}
                        </button>
                    </h2>
                    <div id="faq{{ faq.id }}"
                         class="accordion-collapse collapse {% if loop.first %}show{% endif %}"
                         data-bs-parent="#faqAccordion">
                        <div class="accordion-body">
                            {{ faq.answer | safe }}
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/faq/faq.js') }}"></script>
{% endblock %}
